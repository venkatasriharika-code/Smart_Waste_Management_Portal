name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build React app
        working-directory: client/wastmanagemet
        env:
          VITE_BASE_PATH: /smart_waste_management_portal/
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
          npm run build
          test -f dist/index.html
          touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/wastmanagemet/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
